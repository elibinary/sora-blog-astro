  <line x1="60" y1="95" x2="95" y2="110" stroke="#5a5e79" stroke-width="1.5"/>
  <line x1="60" y1="110" x2="95" y2="125" stroke="#5a5e79" stroke-width="1.5"/>
  <line x1="105" y1="95" x2="140" y2="80" stroke="#5a5e79" stroke-width="1.5"/>
  <line x1="105" y1="110" x2="140" y2="95" stroke="#5a5e79" stroke-width="1.5"/>
  <line x1="105" y1="125" x2="140" y2="110" stroke="#5a5e79" stroke-width="1.5"/>
  <!-- 知识光芒 -->
  <circle cx="100" cy="125" r="3" fill="#e94560" opacity="0.8"/>
  <line x1="100" y1="125" x2="100" y2="110" stroke="#e94560" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="125" x2="112" y2="115" stroke="#e94560" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="125" x2="88" y2="115" stroke="#e94560" stroke-width="2" opacity="0.6"/>
</svg>
